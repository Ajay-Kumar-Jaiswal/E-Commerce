<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Login — Velora</title>
<meta name="description" content="Sign in to your Velora account." />
<link rel="stylesheet" href="style.css" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="min-h-screen flex flex-col">
<div id="navbar"></div>
<main class="flex-1 min-h-screen bg-gray-100 dark:bg-gray-900 flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md bg-white dark:bg-gray-800 rounded-xl shadow-lg p-8">
    <h1 class="text-3xl font-bold text-center mb-2 text-black dark:text-white">Welcome Back</h1>
    <p class="text-gray-500 dark:text-gray-400 text-center mb-8">Sign in to your Velora account</p>
    <form id="login-form" class="space-y-5">
      <div>
        <label class="block mb-2 font-medium text-black dark:text-white">Email</label>
        <input required type="email" name="email" placeholder="Enter your email" class="fld" />
      </div>
      <div>
        <label class="block mb-2 font-medium text-black dark:text-white">Password</label>
        <input required type="password" name="password" placeholder="Enter your password" class="fld" />
      </div>
      <button class="w-full bg-black dark:bg-white text-white dark:text-black py-3 rounded-lg hover:bg-gray-800 dark:hover:bg-gray-200 transition">Sign In</button>
    </form>
    <p class="text-center mt-6 text-gray-600 dark:text-gray-400">Don't have an account? <a href="signup.html" class="text-blue-600 dark:text-blue-400 hover:underline font-medium">Sign Up</a></p>
  </div>
</main>
<div id="footer"></div>
<style>
.fld { width:100%; border:1px solid #d1d5db; background:#fff; color:#000; border-radius:.5rem; padding:.75rem 1rem; }
.dark .fld { background:#374151; color:#fff; border-color:#4b5563; }
.fld:focus { outline:none; box-shadow:0 0 0 2px #000; }
.dark .fld:focus { box-shadow:0 0 0 2px #fff; }
</style>
<script src="store.js"></script>
<script src="layout.js"></script>
<script>
document.getElementById('login-form').addEventListener('submit', (e) => {
  e.preventDefault();
  toast('Login functionality will be added later.');
});
</script>
</body>
</html>
