<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Shop — Velora</title>
<meta name="description" content="Browse the full Velora catalog. Filter by category, search, and sort by price." />
<link rel="stylesheet" href="style.css" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="min-h-screen flex flex-col">
<div id="navbar"></div>
<main class="flex-1 min-h-screen bg-white dark:bg-gray-900">
  <div class="max-w-7xl mx-auto px-6 py-12">
    <h1 class="text-4xl font-bold mb-10 text-black dark:text-white">Shop</h1>
    <div class="grid md:grid-cols-3 gap-4 mb-10">
      <input id="search" type="text" placeholder="Search products..." class="border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 text-black dark:text-white rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500" />
      <select id="category" class="border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 text-black dark:text-white rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500"></select>
      <select id="sort" class="border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 text-black dark:text-white rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option value="">Sort</option>
        <option value="low">Price: Low → High</option>
        <option value="high">Price: High → Low</option>
      </select>
    </div>
    <div id="results"></div>
  </div>
</main>
<div id="footer"></div>
<script src="data.js"></script>
<script src="store.js"></script>
<script src="layout.js"></script>
<script src="ui.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(location.search);
  const cats = ['All', ...new Set(PRODUCTS.map(p => p.category))];
  const catSel = document.getElementById('category');
  catSel.innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');
  catSel.value = params.get('category') || 'All';
  const searchEl = document.getElementById('search');
  const sortEl = document.getElementById('sort');
  const results = document.getElementById('results');

  function render() {
    let list = [...PRODUCTS];
    if (catSel.value !== 'All') list = list.filter(p => p.category === catSel.value);
    const q = searchEl.value.trim().toLowerCase();
    if (q) list = list.filter(p => p.name.toLowerCase().includes(q));
    if (sortEl.value === 'low') list.sort((a,b) => a.price - b.price);
    if (sortEl.value === 'high') list.sort((a,b) => b.price - a.price);
    if (list.length === 0) {
      results.innerHTML = `<div class="text-center py-20"><h2 class="text-2xl font-semibold text-black dark:text-white">No products found</h2></div>`;
    } else {
      results.innerHTML = `<div class="grid gap-8 sm:grid-cols-2 lg:grid-cols-4">${list.map(renderProductCard).join('')}</div>`;
      wireProductCards(results);
    }
  }
  [searchEl, catSel, sortEl].forEach(el => el.addEventListener('input', render));
  render();
});
</script>
</body>
</html>
