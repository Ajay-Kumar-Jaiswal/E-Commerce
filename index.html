<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Velora — Premium Fashion Store</title>
<meta name="description" content="Velora is a premium fashion store. Discover luxury clothing, shoes, and accessories for men and women." />
<link rel="stylesheet" href="css/style.css" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="min-h-screen flex flex-col">
<div id="navbar"></div>

<main class="flex-1">
  <!-- Hero -->
  <section class="bg-[#f8f8f8] dark:bg-gray-900 min-h-[90vh] flex items-center">
    <div class="max-w-7xl mx-auto grid md:grid-cols-2 gap-10 px-6 items-center w-full">
      <div class="hero-left">
        <p class="uppercase tracking-[6px] text-yellow-600 font-semibold">New Collection 2025</p>
        <h1 class="text-6xl md:text-7xl font-bold mt-5 leading-tight text-black dark:text-white">Discover Luxury Fashion</h1>
        <p class="text-gray-600 dark:text-gray-300 text-lg mt-6 max-w-lg">Upgrade your wardrobe with premium fashion designed for elegance, comfort, and confidence.</p>
        <a href="shop.html" class="inline-block mt-8 bg-black dark:bg-white text-white dark:text-black px-8 py-4 rounded-full hover:bg-yellow-600 hover:text-white transition duration-300">Shop Now</a>
      </div>
      <div class="hero-right flex justify-center">
        <img src="https://images.unsplash.com/photo-1529139574466-a303027c1d8b?w=700" alt="Fashion" class="rounded-3xl shadow-2xl w-full max-w-lg object-cover" />
      </div>
    </div>
  </section>

  <!-- Categories -->
  <section class="py-20 bg-white dark:bg-gray-900">
    <div class="max-w-7xl mx-auto px-6">
      <h2 class="text-4xl font-bold text-center mb-12 text-black dark:text-white">Shop By Category</h2>
      <div id="categories-grid" class="grid sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
    </div>
  </section>

  <!-- Featured -->
  <section class="py-20 bg-gray-50 dark:bg-gray-950">
    <div class="max-w-7xl mx-auto px-6">
      <h2 class="text-4xl font-bold text-center mb-12 text-black dark:text-white">Featured Products</h2>
      <div id="featured-grid" class="grid gap-8 sm:grid-cols-2 lg:grid-cols-4"></div>
    </div>
  </section>
</main>

<div id="footer"></div>

<script src="js/data.js"></script>
<script src="js/store.js"></script>
<script src="js/layout.js"></script>
<script src="js/ui.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('categories-grid').innerHTML = CATEGORIES.map(c => `
    <a href="shop.html?category=${encodeURIComponent(c.name)}" class="category-card fade-in group rounded-3xl overflow-hidden shadow-lg dark:shadow-gray-800 bg-white dark:bg-gray-800 block">
      <div class="overflow-hidden"><img src="${c.image}" alt="${c.name}" class="h-80 w-full object-cover" /></div>
      <div class="p-5 text-center"><h3 class="text-2xl font-semibold text-black dark:text-white">${c.name}</h3></div>
    </a>`).join('');
  document.getElementById('featured-grid').innerHTML = PRODUCTS.slice(0, 8).map(renderProductCard).join('');
  wireProductCards();
});
</script>
</body>
</html>
