<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Contact — Velora</title>
<meta name="description" content="Get in touch with the Velora team. We would love to hear from you." />
<link rel="stylesheet" href="style.css" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="min-h-screen flex flex-col">
<div id="navbar"></div>
<main class="flex-1 min-h-screen bg-gray-50 dark:bg-gray-900 py-16">
  <div class="max-w-6xl mx-auto px-6">
    <h1 class="text-5xl font-bold text-center mb-4 text-black dark:text-white">Contact Us</h1>
    <p class="text-center text-gray-600 dark:text-gray-400 mb-14">We'd love to hear from you. Send us a message anytime.</p>
    <div class="grid md:grid-cols-2 gap-12">
      <div class="bg-white dark:bg-gray-800 rounded-xl shadow-md p-8">
        <h2 class="text-2xl font-semibold mb-8 text-black dark:text-white">Get In Touch</h2>
        <div class="space-y-6">
          <div><h3 class="font-semibold text-black dark:text-white">📍 Address</h3><p class="text-gray-600 dark:text-gray-300">123 Commerce Street<br />Mumbai, India</p></div>
          <div><h3 class="font-semibold text-black dark:text-white">📞 Phone</h3><p class="text-gray-600 dark:text-gray-300">+91 98765 43210</p></div>
          <div><h3 class="font-semibold text-black dark:text-white">✉️ Email</h3><p class="text-gray-600 dark:text-gray-300">support@velora.com</p></div>
          <div><h3 class="font-semibold text-black dark:text-white">🕒 Working Hours</h3><p class="text-gray-600 dark:text-gray-300">Monday – Saturday<br />9:00 AM – 7:00 PM</p></div>
        </div>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-xl shadow-md p-8">
        <h2 class="text-2xl font-semibold mb-8 text-black dark:text-white">Send a Message</h2>
        <form id="contact-form" class="space-y-5">
          <input required name="name" placeholder="Your Name" class="ck-input" />
          <input required name="email" type="email" placeholder="Your Email" class="ck-input" />
          <input required name="subject" placeholder="Subject" class="ck-input" />
          <textarea required name="message" rows="5" placeholder="Your Message" class="ck-input"></textarea>
          <button class="w-full bg-black dark:bg-white text-white dark:text-black py-3 rounded-lg hover:bg-gray-800 dark:hover:bg-gray-200 transition">Send Message</button>
        </form>
      </div>
    </div>
  </div>
</main>
<div id="footer"></div>
<style>
.ck-input { border-radius:.5rem; padding:.75rem 1rem; width:100%; background:#fff; color:#000; border:1px solid #d1d5db; }
.dark .ck-input { background:#374151; color:#fff; border-color:#4b5563; }
.ck-input:focus { outline:none; box-shadow:0 0 0 2px #000; }
.dark .ck-input:focus { box-shadow:0 0 0 2px #fff; }
</style>
<script src="store.js"></script>
<script src="layout.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('contact-form').addEventListener('submit', (e) => {
    e.preventDefault();
    toast('Thank you! Your message has been received.');
    e.target.reset();
  });
});
</script>
</body>
</html>
