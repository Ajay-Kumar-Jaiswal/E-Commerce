<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Product — Velora</title>
<meta name="description" content="View product details, choose size and color, and add to cart." />
<link rel="stylesheet" href="css/style.css" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="min-h-screen flex flex-col">
<div id="navbar"></div>
<main class="flex-1 min-h-screen bg-white dark:bg-gray-900">
  <div class="max-w-7xl mx-auto px-6 py-16" id="product-root"></div>
</main>
<div id="footer"></div>
<script src="js/data.js"></script>
<script src="js/store.js"></script>
<script src="js/layout.js"></script>
<script src="js/ui.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const id = Number(new URLSearchParams(location.search).get('id'));
  const p = PRODUCTS.find(x => x.id === id);
  const root = document.getElementById('product-root');
  if (!p) { root.innerHTML = `<h1 class="text-3xl font-bold text-black dark:text-white text-center">Product not found</h1>`; return; }

  document.title = `${p.name} — Velora`;
  let quantity = 1, size = 'M', color = 'Black';
  const sizes = ['S','M','L','XL'];
  const colors = [
    { name: 'Black', bg: '#000' },
    { name: 'Gray', bg: '#6b7280' },
    { name: 'Blue', bg: '#2563eb' },
    { name: 'Red', bg: '#ef4444' },
  ];

  function draw() {
    const inWl = Wishlist.has(p.id);
    root.innerHTML = `
    <div class="grid md:grid-cols-2 gap-12">
      <div><img src="${p.image}" alt="${p.name}" class="rounded-xl w-full object-cover" /></div>
      <div>
        <p class="text-gray-500 dark:text-gray-400">${p.category}</p>
        <h1 class="text-4xl font-bold mt-2 text-black dark:text-white">${p.name}</h1>
        <div class="flex items-center gap-2 mt-4">
          <i class="fas fa-star text-yellow-500"></i>
          <span class="font-medium text-black dark:text-white">${p.rating}</span>
          <span class="text-gray-500 dark:text-gray-400">(124 Reviews)</span>
        </div>
        <p class="text-3xl font-bold mt-3 text-black dark:text-white">$${p.price}</p>
        <p class="mt-6 text-gray-600 dark:text-gray-300">Premium quality product made with excellent craftsmanship. Perfect for everyday use and designed to provide both comfort and style.</p>

        <div class="mt-8">
          <h3 class="font-semibold mb-3 text-black dark:text-white">Size</h3>
          <div class="flex gap-3">${sizes.map(s => `
            <button data-size="${s}" class="px-5 py-2 rounded-lg border transition ${s===size ? 'bg-black text-white border-black dark:bg-white dark:text-black dark:border-white' : 'border-gray-300 dark:border-gray-600 text-black dark:text-white hover:bg-black hover:text-white dark:hover:bg-white dark:hover:text-black'}">${s}</button>`).join('')}</div>
        </div>

        <div class="mt-8">
          <h3 class="font-semibold mb-3 text-black dark:text-white">Color</h3>
          <div class="flex gap-4">${colors.map(c => `
            <button data-color="${c.name}" style="background:${c.bg}" class="w-9 h-9 rounded-full border-4 transition ${c.name===color ? 'border-blue-500 scale-110' : 'border-gray-300 dark:border-gray-600'}"></button>`).join('')}</div>
        </div>

        <p class="mt-4 text-sm text-gray-600 dark:text-gray-300">Selected: ${size} / ${color}</p>

        <div class="flex items-center gap-6 mt-8 flex-wrap">
          <div class="flex items-center gap-4">
            <div class="flex items-center border rounded-lg overflow-hidden border-gray-300 dark:border-gray-600">
              <button data-qty="-1" class="px-4 py-2 text-xl hover:bg-gray-100 dark:hover:bg-gray-700 text-black dark:text-white">−</button>
              <span class="px-6 font-semibold text-black dark:text-white">${quantity}</span>
              <button data-qty="1" class="px-4 py-2 text-xl hover:bg-gray-100 dark:hover:bg-gray-700 text-black dark:text-white">+</button>
            </div>
            <button data-add class="bg-black dark:bg-white text-white dark:text-black px-8 py-3 rounded-lg hover:bg-gray-800 dark:hover:bg-gray-200 transition">Add To Cart</button>
          </div>
          <button data-wl class="border border-gray-300 dark:border-gray-600 rounded-lg p-3 hover:bg-gray-100 dark:hover:bg-gray-700 transition ${inWl ? 'text-red-500' : 'text-gray-500'}"><i class="fas fa-heart"></i></button>
        </div>
      </div>
    </div>

    <section class="mt-20">
      <h2 class="text-3xl font-bold mb-8 text-black dark:text-white">Related Products</h2>
      <div class="grid gap-8 sm:grid-cols-2 lg:grid-cols-4">
        ${PRODUCTS.filter(x => x.id !== p.id).slice(0,4).map(renderProductCard).join('')}
      </div>
    </section>`;

    root.querySelectorAll('[data-size]').forEach(b => b.addEventListener('click', () => { size = b.dataset.size; draw(); }));
    root.querySelectorAll('[data-color]').forEach(b => b.addEventListener('click', () => { color = b.dataset.color; draw(); }));
    root.querySelectorAll('[data-qty]').forEach(b => b.addEventListener('click', () => {
      quantity = Math.max(1, quantity + Number(b.dataset.qty)); draw();
    }));
    root.querySelector('[data-add]').addEventListener('click', () => {
      for (let i = 0; i < quantity; i++) Cart.add({ id: p.id, name: p.name, price: p.price, image: p.image });
    });
    root.querySelector('[data-wl]').addEventListener('click', () => {
      Wishlist.toggle({ id: p.id, name: p.name, price: p.price, image: p.image }); draw();
    });
    wireProductCards(root);
  }
  draw();
});
</script>
</body>
</html>
