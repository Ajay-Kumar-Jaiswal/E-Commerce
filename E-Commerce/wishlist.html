<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Wishlist — Velora</title>
<meta name="description" content="Your saved favorite products at Velora." />
<link rel="stylesheet" href="css/style.css" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="min-h-screen flex flex-col">
<div id="navbar"></div>
<main class="flex-1 min-h-screen bg-white dark:bg-gray-900">
  <div id="wl-root" class="max-w-7xl mx-auto px-6 py-12"></div>
</main>
<div id="footer"></div>
<script src="js/data.js"></script>
<script src="js/store.js"></script>
<script src="js/layout.js"></script>
<script>
function render() {
  const root = document.getElementById('wl-root');
  const items = Wishlist.items;
  if (items.length === 0) {
    root.innerHTML = `
      <div class="max-w-6xl mx-auto px-6 py-16 text-center">
        <h1 class="text-4xl font-bold mb-4 text-black dark:text-white">Your Wishlist is Empty</h1>
        <p class="text-gray-500 dark:text-gray-400 mb-8">Save your favorite products here.</p>
        <a href="shop.html" class="bg-black dark:bg-white text-white dark:text-black px-8 py-3 rounded-lg hover:bg-gray-800 dark:hover:bg-gray-200 transition inline-block">Continue Shopping</a>
      </div>`;
    return;
  }
  root.innerHTML = `
    <div class="flex justify-between items-center mb-10">
      <h1 class="text-4xl font-bold text-black dark:text-white">My Wishlist</h1>
      <button data-clear class="text-red-500 hover:text-red-700 font-medium">Clear Wishlist</button>
    </div>
    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
      ${items.map(item => `
      <div class="bg-white dark:bg-gray-800 rounded-xl shadow-md dark:shadow-gray-900 overflow-hidden">
        <img src="${item.image}" alt="${item.name}" class="w-full h-64 object-cover" />
        <div class="p-5">
          <h2 class="text-xl font-semibold text-black dark:text-white">${item.name}</h2>
          <p class="text-lg font-bold mt-2 text-black dark:text-white">$${item.price}</p>
          <div class="flex gap-3 mt-6">
            <button data-add="${item.id}" class="flex-1 bg-black dark:bg-white text-white dark:text-black py-3 rounded-lg hover:bg-gray-800 dark:hover:bg-gray-200 transition">Add to Cart</button>
            <button data-rm="${item.id}" class="border border-red-300 dark:border-red-600 px-5 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 text-red-500 transition">Remove</button>
          </div>
        </div>
      </div>`).join('')}
    </div>`;
  root.querySelector('[data-clear]').addEventListener('click', () => Wishlist.clear());
  root.querySelectorAll('[data-add]').forEach(b => b.addEventListener('click', () => {
    const it = Wishlist.items.find(x => x.id === Number(b.dataset.add));
    if (it) Cart.add(it);
  }));
  root.querySelectorAll('[data-rm]').forEach(b => b.addEventListener('click', () => Wishlist.remove(Number(b.dataset.rm))));
}
document.addEventListener('DOMContentLoaded', render);
document.addEventListener('wishlistchange', render);
</script>
</body>
</html>
